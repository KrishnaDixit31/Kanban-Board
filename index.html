<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <nav>
            <div class="heading">Kanban Board</div>
            <div class="add-btn">
                <button id="toggle-modal">Add New Task</button>
            </div>
        </nav>
        <div class="content">
            <div id="todo" class="task-column">
                <div class="column-heading">
                    <div class="heading">Todo</div>
                    <div class="count">0</div>
                </div>
            </div>
            <div id="progress" class="task-column">
                <div class="column-heading">
                    <div class="heading">In Progress</div>
                    <div class="count">0</div>
                </div>
            </div>
            <div id="done" class="task-column">
                <div class="column-heading">
                    <div class="heading">Done</div>
                    <div class="count">0</div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal add-new-task">
        <div class="modal-bg"></div>
        <div class="center">
            <input type="text" id="task-title-input" placeholder="Task Title">
            <textarea id="task-desc-input" placeholder="Task Description"></textarea>
            <button id="add-new-task" class="add-task-btn">Add Task</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
